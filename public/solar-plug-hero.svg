<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#2d5a8e"/>
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="500" height="220" rx="16" fill="url(#sky)"/>

  <!-- Ground -->
  <rect x="0" y="180" width="500" height="40" rx="0" fill="#86efac" opacity="0.7"/>
  <rect x="0" y="180" width="500" height="2" fill="#22c55e" opacity="0.3"/>

  <!-- Smiling Sun -->
  <circle cx="410" cy="55" r="42" fill="#fbbf24" opacity="0.2"/>
  <circle cx="410" cy="55" r="30" fill="#fbbf24"/>
  <!-- Sun rays -->
  <line x1="410" y1="15" x2="410" y2="5" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="410" y1="95" x2="410" y2="105" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="370" y1="55" x2="360" y2="55" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="450" y1="55" x2="460" y2="55" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="381" y1="26" x2="374" y2="19" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="439" y1="84" x2="446" y2="91" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="439" y1="26" x2="446" y2="19" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="381" y1="84" x2="374" y2="91" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <!-- Smile face -->
  <circle cx="400" cy="50" r="3.5" fill="#92400e"/>
  <circle cx="420" cy="50" r="3.5" fill="#92400e"/>
  <path d="M398 62 Q410 74 422 62" stroke="#92400e" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Solar Panel 1 (left, tilted) -->
  <g transform="translate(40, 70) rotate(-10)">
    <rect width="100" height="65" rx="3" fill="url(#panel)" stroke="#1e3a5f" stroke-width="2"/>
    <line x1="0" y1="22" x2="100" y2="22" stroke="#60a5fa" stroke-width="0.7" opacity="0.5"/>
    <line x1="0" y1="44" x2="100" y2="44" stroke="#60a5fa" stroke-width="0.7" opacity="0.5"/>
    <line x1="33" y1="0" x2="33" y2="65" stroke="#60a5fa" stroke-width="0.7" opacity="0.5"/>
    <line x1="66" y1="0" x2="66" y2="65" stroke="#60a5fa" stroke-width="0.7" opacity="0.5"/>
  </g>

  <!-- Solar Panel 2 (center, slightly tilted) -->
  <g transform="translate(155, 55) rotate(-5)">
    <rect width="100" height="65" rx="3" fill="url(#panel)" stroke="#1e3a5f" stroke-width="2"/>
    <line x1="0" y1="22" x2="100" y2="22" stroke="#60a5fa" stroke-width="0.7" opacity="0.5"/>
    <line x1="0" y1="44" x2="100" y2="44" stroke="#60a5fa" stroke-width="0.7" opacity="0.5"/>
    <line x1="33" y1="0" x2="33" y2="65" stroke="#60a5fa" stroke-width="0.7" opacity="0.5"/>
    <line x1="66" y1="0" x2="66" y2="65" stroke="#60a5fa" stroke-width="0.7" opacity="0.5"/>
  </g>

  <!-- Solar Panel 3 (right, tilted other way) -->
  <g transform="translate(265, 65) rotate(-8)">
    <rect width="100" height="65" rx="3" fill="url(#panel)" stroke="#1e3a5f" stroke-width="2"/>
    <line x1="0" y1="22" x2="100" y2="22" stroke="#60a5fa" stroke-width="0.7" opacity="0.5"/>
    <line x1="0" y1="44" x2="100" y2="44" stroke="#60a5fa" stroke-width="0.7" opacity="0.5"/>
    <line x1="33" y1="0" x2="33" y2="65" stroke="#60a5fa" stroke-width="0.7" opacity="0.5"/>
    <line x1="66" y1="0" x2="66" y2="65" stroke="#60a5fa" stroke-width="0.7" opacity="0.5"/>
  </g>

  <!-- Cable from panels to outlet -->
  <path d="M310 130 Q330 155 350 155 Q370 155 370 170" stroke="#404040" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- 120V Wall Outlet -->
  <rect x="350" y="148" width="44" height="38" rx="6" fill="#f5f5f4" stroke="#a8a29e" stroke-width="2"/>
  <!-- Outlet face plate border -->
  <rect x="355" y="152" width="34" height="30" rx="4" fill="#fafaf9" stroke="#d6d3d1" stroke-width="1"/>
  <!-- Left slot (vertical) -->
  <rect x="363" y="158" width="4" height="12" rx="2" fill="#57534e"/>
  <!-- Right slot (vertical) -->
  <rect x="377" y="158" width="4" height="12" rx="2" fill="#57534e"/>
  <!-- Ground (round) -->
  <circle cx="372" cy="176" r="3" fill="#57534e"/>
  <!-- 120V label -->
  <text x="372" y="194" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#78716c">120V</text>

  <!-- Plug prongs going into outlet -->
  <rect x="364" y="142" width="3" height="18" rx="1" fill="#737373"/>
  <rect x="378" y="142" width="3" height="18" rx="1" fill="#737373"/>
</svg>
