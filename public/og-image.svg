<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect y="590" width="1200" height="40" fill="url(#bar)"/>
  <!-- Sun emoji area -->
  <text x="600" y="160" font-size="100" text-anchor="middle" dominant-baseline="middle">&#x1F31E;</text>
  <!-- Title -->
  <text x="600" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#18181b" text-anchor="middle">Balcony Solar Calculator</text>
  <!-- Subtitle -->
  <text x="600" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#52525b" text-anchor="middle">Is plug-in solar worth it for your home?</text>
  <!-- Feature pills -->
  <rect x="180" y="370" width="240" height="44" rx="22" fill="#dcfce7"/>
  <text x="300" y="398" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#166534" text-anchor="middle">50-State Coverage</text>
  <rect x="480" y="370" width="240" height="44" rx="22" fill="#dcfce7"/>
  <text x="600" y="398" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#166534" text-anchor="middle">Real Utility Rates</text>
  <rect x="780" y="370" width="240" height="44" rx="22" fill="#dcfce7"/>
  <text x="900" y="398" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#166534" text-anchor="middle">NREL PVWatts Data</text>
  <!-- CTA -->
  <rect x="400" y="450" width="400" height="56" rx="12" fill="#16a34a"/>
  <text x="600" y="486" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="#ffffff" text-anchor="middle">Free &#x2014; No Signup Required</text>
  <!-- Brand -->
  <text x="600" y="565" font-family="system-ui, sans-serif" font-size="20" fill="#a1a1aa" text-anchor="middle">ElectrifyEverythingNow.com</text>
</svg>
